<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SUPER SATURN // Arcade Portfolio</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- STARFIELD CANVAS -->
  <canvas id="starfield"></canvas>

  <!-- TOP LEFT LOGO -->
  <img src="assets/images/saturn.png" class="logo-saturn" alt="Saturn Logo">

  <!-- HERO -->
  <header>
    <div class="hero">

      <!-- GALAGA TITLE -->
      <div class="galaga-title" id="galagatitle">
        <div class="title-scanline"></div>
        <div class="title-glitch" data-text="SUPRSATURN">SUPER SATURN</div>
        <div class="title-sub">
          <span class="coin-blink">✦</span>
          INSERT COIN
          <span class="coin-blink">✦</span>
        </div>
      </div>

      <p>
        Everything Music.
      </p>

      <div class="hero-buttons">
        <a href="#portfolio" class="btn btn-primary">VIEW PORTFOLIO</a>
        <a href="#contact" class="btn btn-secondary">CONTACT</a>
      </div>
    </div>
  </header>

  <!-- PORTFOLIO -->
  <section id="portfolio">
    <div class="container">

      <div class="section-title">
        <h2>FEATURED VIDEOS</h2>
        <p>Music video collection</p>
      </div>

      <div class="video-grid" id="videoGrid"></div>

    </div>
  </section>

  <!-- ABOUT -->
  <section class="about-section">
    <div class="container about-container">

      <div>
        <div class="section-title"></div>
          <h2>ABOUT</h2>
          <p>
            A media company focused on music videos,
            storytelling, exclusive content, merchandise and more.
          </p>
        </div>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <div class="container contact-section">

      <h2>LET'S WORK</h2>

      <p>Contact for collaborations or video editing work</p>

      <div class="hero-buttons">
        <a href="mailto:supersupersaturn@gmail.com" class="btn btn-primary">EMAIL</a>
        <a href="https://youtube.com/@suprsaturn" target="_blank" class="btn btn-secondary">YOUTUBE</a>
      </div>

    </div>
  </section>

  <script src="js/script.js"></script>

</body>
</html>
